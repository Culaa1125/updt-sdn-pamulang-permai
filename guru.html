<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guru & Staff – UPTD SDN Pamulang Permai</title>
  <link rel="icon" href="img/logo.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1D4ED8','primary-dark': '#1E3A8A','primary-mid': '#2563EB',
            'primary-light': '#3B82F6','primary-pale': '#DBEAFE',
            accent: '#EFF6FF', surface: '#F8FAFC'
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="font-sans text-gray-800 bg-white">

<!-- Page Hero -->
<div class="page-hero text-white text-center">
  <div class="relative z-10 max-w-3xl mx-auto">
    <span class="inline-block px-4 py-1 bg-white/20 rounded-full text-sm font-semibold mb-3">Tenaga Pendidik</span>
    <h1 class="text-3xl md:text-5xl font-extrabold mb-2">Guru & Staff</h1>
    <p class="text-blue-100 text-base mb-2">Kenali tenaga pendidik dan staf UPTD SDN Pamulang Permai</p>
  </div>
</div>

<!-- Content -->
<section class="py-20 px-4 bg-white">
  <div class="max-w-6xl mx-auto">
    <!-- Search -->
    <div class="max-w-md mx-auto mb-10 anim-fade-up">
      <div class="relative">
        <i data-lucide="search" class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
        <input type="text" id="searchGuru" placeholder="Cari nama guru atau jabatan..." class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-light text-sm">
      </div>
    </div>

    <!-- Grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 anim-fade-up" id="guruGrid"></div>
    <p id="guruEmpty" class="text-center text-gray-400 mt-8 hidden">Tidak ditemukan guru/staff dengan nama tersebut.</p>
  </div>
</section>

<script src="shared.js"></script>
<script>
const guruData = [
  { nama: 'Sutiyah, S.Pd (PNS)', jabatan: 'Kepala Sekolah', mapel: '-' },
  { nama: 'Munsi, S.Pd (PNS)', jabatan: 'Guru Kelas II A', mapel: 'Tematik' },
  { nama: 'Hasanudin, S.Pd (PNS)', jabatan: 'Guru PJOK', mapel: 'PJOK' },
  { nama: 'Risyanti Wardah, M.M (PNS)', jabatan: 'Guru Kelas V A', mapel: 'Tematik' },
  { nama: 'Sanin Sofian, S.Pd (PNS)', jabatan: 'Guru Kelas V C', mapel: 'Tematik' },
  { nama: 'Neneng Ernawati, S.Pd (PNS)', jabatan: 'Guru Kelas I B', mapel: 'Tematik' },
  { nama: 'Ninik Fitrianti, S.Pd (PNS)', jabatan: 'Guru Kelas I C', mapel: 'Tematik' },
  { nama: 'Sugeng, S.Pd (PNS)', jabatan: 'Guru Kelas VI C', mapel: 'Tematik' },
  { nama: 'Sumardi, M.Pd (PNS)', jabatan: 'Guru Kelas III B & SBDP', mapel: 'Tematik / SBDP' },
  { nama: 'Siti Aisyah, S.Pd (PNS)', jabatan: 'Guru Kelas VI A', mapel: 'Tematik' },
  { nama: 'Aas Suhastini, S.Pd (PNS)', jabatan: 'Guru Kelas VI B', mapel: 'Tematik' },
  { nama: 'Sofi Apriyanti, S.Pd (PPPK)', jabatan: 'Guru Kelas IV A', mapel: 'Tematik' },
  { nama: 'Masni, S.Pd (PPPK)', jabatan: 'Guru Kelas III C', mapel: 'Tematik' },
  { nama: 'Wiwit Roslina, S.Pd (PPPK)', jabatan: 'Guru Kelas I A', mapel: 'Tematik' },
  { nama: 'Abdul Muslim, S.Pd.I (GTT)', jabatan: 'Guru PAI & BTQ', mapel: 'PAI / BTQ' },
  { nama: 'Eka Fajriyati, S.Pd (PPPK)', jabatan: 'Guru Kelas V B', mapel: 'Tematik' },
  { nama: 'Badriah, S.Pd (PPPK)', jabatan: 'Guru Kelas II C', mapel: 'Tematik' },
  { nama: 'Farhah Nurmilah, S.Pd.I (PPPK)', jabatan: 'Guru PAI & BTQ', mapel: 'PAI / BTQ' },
  { nama: 'Ikhwan Suhada El Jandara, S.Pd (PPPK)', jabatan: 'Guru Kelas II B & B. Inggris', mapel: 'Tematik / B. Inggris' },
  { nama: 'Toriq Amar, S.Pd (PPPK)', jabatan: 'Guru Kelas III A', mapel: 'Tematik' },
  { nama: 'Teja Agus Swarsa, S.Pd (PPPK)', jabatan: 'Guru Kelas IV B', mapel: 'Tematik' },
  { nama: 'Asep Kurnia N, S.Pd (PPPK)', jabatan: 'Guru PJOK', mapel: 'PJOK' },
  { nama: 'Tajdidun Nisa, S.Pd (PPPK)', jabatan: 'Guru Kelas IV C', mapel: 'Tematik' },
  { nama: 'Radipan (PTT)', jabatan: 'Kebersihan', mapel: '-' },
  { nama: 'Mardatilla Rahman, S. Pd (PTT)', jabatan: 'Tata Usaha / B. Inggris', mapel: 'B. Inggris' },
  { nama: 'Haviz (PTT)', jabatan: 'Tata Usaha', mapel: '-' },
  { nama: 'Maswarno (PTT)', jabatan: 'Tata Usaha', mapel: '-' },
  { nama: 'Supriyanto (PTT)', jabatan: 'Kebersihan', mapel: '-' },
  { nama: 'Ajat Sudrajat (PTT)', jabatan: 'Keamanan', mapel: '-' }
];

function renderGuru(filter = '') {
  const grid = document.getElementById('guruGrid');
  const empty = document.getElementById('guruEmpty');
  const q = filter.toLowerCase();
  const filtered = guruData.filter(g => g.nama.toLowerCase().includes(q) || g.jabatan.toLowerCase().includes(q));
  grid.innerHTML = filtered.map(g => `
    <div class="card-hover bg-white border border-gray-100 rounded-2xl p-5 shadow-sm flex items-start gap-4">
      <div class="w-11 h-11 bg-primary-pale rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-primary font-bold text-sm">${g.nama.charAt(0)}</span>
      </div>
      <div>
        <p class="font-semibold text-gray-800 text-sm">${g.nama}</p>
        <p class="text-xs text-primary font-medium mt-0.5">${g.jabatan}</p>
        ${g.mapel !== '-' ? `<p class="text-xs text-gray-400 mt-0.5">Mapel: ${g.mapel}</p>` : ''}
      </div>
    </div>
  `).join('');
  empty.classList.toggle('hidden', filtered.length > 0);
}
renderGuru();
document.getElementById('searchGuru').addEventListener('input', e => renderGuru(e.target.value));
</script>
</body>
</html>
